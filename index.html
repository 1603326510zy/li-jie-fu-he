<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>头像合成工具</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            text-align: center;
            background: #1e1e1e;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 420px; margin: 0 auto; }
        h2 { margin-bottom: 20px; color: #ff4444; }
        .control-group {
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .control-label {
            width: 100px;
            text-align: right;
            margin-right: 10px;
            font-size: 14px;
        }
        canvas {
            border: 2px solid #ff4444;
            border-radius: 8px;
            margin: 20px 0;
            background: #2a2a2a;
            touch-action: none;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        button {
            padding: 10px 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            margin: 5px;
        }
        button:hover {
            background: #ff2222;
        }
        button#reset {
            background: #555;
        }
        button#reset:hover {
            background: #444;
        }
        .radio-group { display: flex; align-items: center; gap: 6px; }
        .radio-group label { margin: 0 8px 0 2px; font-size:14px; }
        #logoInputGroup { display: none; }
        input[type="range"] { width:160px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>头像合成工具</h2>
        
        <div class="control-group">
            <label class="control-label">头像本体：</label>
            <input type="file" id="bgInput" accept="image/*">
        </div>

        <div class="control-group">
            <label class="control-label">Logo模式：</label>
            <div class="radio-group">
                <input type="radio" name="logoMode" id="useDefaultLogo" value="default" checked>
                <label for="useDefaultLogo">默认Logo</label>
                <input type="radio" name="logoMode" id="useCustomLogo" value="custom">
                <label for="useCustomLogo">自定义Logo</label>
            </div>
        </div>

        <div class="control-group" id="logoInputGroup">
            <label class="control-label">Logo图像：</label>
            <input type="file" id="logoInput" accept="image/*">
        </div>
        
        <div class="control-group">
            <label class="control-label">头像缩放：</label>
            <input type="range" id="bgScale" min="0.3" max="2.5" step="0.01" value="1">
        </div>
        
        <div class="control-group">
            <label class="control-label">Logo大小：</label>
            <input type="range" id="logoScale" min="0.3" max="1.8" step="0.01" value="1">
        </div>
        
        <div class="control-group">
            <label class="control-label">Logo透明度：</label>
            <input type="range" id="logoOpacity" min="0" max="100" step="1" value="100">
        </div>
        
        <div class="control-group">
            <label class="control-label">边框形状：</label>
            <div class="radio-group">
                <input type="radio" name="borderShape" id="squareBorder" value="square" checked>
                <label for="squareBorder">方形</label>
                <input type="radio" name="borderShape" id="circleBorder" value="circle">
                <label for="circleBorder">圆形</label>
            </div>
        </div>
        
        <canvas id="canvas" width="400" height="400"></canvas><br>
        
        <button id="reset">重置</button>
        <button id="download">下载头像</button>
    </div>

        let bgScale = 1;
        let bgOffsetX = 0;
        let bgOffsetY = 0;
        let isDragging = false;

        // 电脑端拖拽
        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', drag);
        canvas.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('mouseleave', stopDrag);

        // 手机端触屏拖拽（已修复）
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            startDrag(touch);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            drag(touch);
        });
        canvas.addEventListener('touchend', stopDrag);
        canvas.addEventListener('touchcancel', stopDrag);

        function startDrag(e) {
            if (!bgImg) return;
            isDragging = true;
            dragStartX = e.clientX - bgOffsetX;
            dragStartY = e.clientY - bgOffsetY;
        }
        function drag(e) {
            if (!isDragging || !bgImg) return;
            bgOffsetX = e.clientX - dragStartX;
            bgOffsetY = e.clientY - dragStartY;
            draw();
        }
        function stopDrag() {
            isDragging = false;
        }

        // 初始化
        defaultLogoImg.onload = draw;

        // 上传头像
        bgInput.onchange = e => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    bgImg = img;
                    bgScale = 1;
                    bgOffsetX = bgOffsetY = 0;
                    bgScaleSlider.value = 1;
                    draw();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 自定义Logo
        logoInput.onchange = e => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    customLogoImg = img;
                    draw();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 切换Logo模式
        useDefaultLogo.onchange = () => { logoInputGroup.style.display = 'none'; draw(); };
        useCustomLogo.onchange = () => { logoInputGroup.style.display = 'flex'; draw(); };

        // 滑块
        bgScaleSlider.oninput = () => { bgScale = +bgScaleSlider.value; draw(); };
        logoScaleSlider.oninput = draw;
        logoOpacitySlider.oninput = draw;
        squareBorder.onchange = draw;
        circleBorder.onchange = draw;

        // 绘制
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save();

            if (circleBorder.checked) {
                ctx.beginPath();
                ctx.arc(200,200,200,0,Math.PI*2);
                ctx.clip();
            }

            if (bgImg) {
                const w = bgImg.width * bgScale;
                const h = bgImg.height * bgScale;
                const x = 200 - w/2 + bgOffsetX;
                const y = 200 - h/2 + bgOffsetY;
                ctx.drawImage(bgImg, x, y, w, h);
            }

            const logo = useDefaultLogo.checked ? defaultLogoImg : customLogoImg;
            if (logo && logo.src) {
                ctx.globalAlpha = logoOpacitySlider.value / 100;
                const s = 400 * logoScaleSlider.value;
                ctx.drawImage(logo, 200-s/2, 200-s/2, s, s);
                ctx.globalAlpha = 1;
            }

            ctx.restore();
        }

        // 重置按钮
        resetBtn.onclick = () => {
            bgImg = customLogoImg = null;
            bgInput.value = logoInput.value = "";
            bgScaleSlider.value = logoScaleSlider.value = 1;
            logoOpacitySlider.value = 100;
            useDefaultLogo.checked = squareBorder.checked = true;
            logoInputGroup.style.display = 'none';
            bgScale = 1;
            bgOffsetX = bgOffsetY = 0;
            draw();
        };

        // 下载
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.download = '头像.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        };
    </script>
